name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Tell cudarc/bindgen_cuda the CUDA version and compute capability without
  # requiring nvcc or nvidia-smi. candle-core's cuda feature pulls in both
  # crates; their build scripts probe for GPU tooling by default, which fails
  # on CI runners that don't have a CUDA toolkit installed.
  CUDARC_CUDA_VERSION: "12060"
  CUDA_COMPUTE_CAP: "80"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      # Format-check only the packages that don't require GPU toolchains.
      # inferrs-backend-musa has no MUSA SDK dependency at compile time (it
      # probes libmusart.so via dlopen at runtime) so it can be checked here.
      - run: cargo fmt --check -p inferrs -p inferrs-benchmark -p inferrs-backend-musa -p inferrs-backend-vulkan

  clippy:
    name: Clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install nvcc (needed by candle-kernels build script)
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends cuda-nvcc-12-6
          echo "/usr/local/cuda/bin" >> "$GITHUB_PATH"
      # inferrs-backend-musa is included here for the same reason as fmt: it has
      # no compile-time MUSA SDK dependency.
      - run: cargo clippy -p inferrs -p inferrs-benchmark -p inferrs-backend-musa -p inferrs-backend-vulkan -- -D warnings

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-26
            rustflags: "-C target-feature=+fullfp16"
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            rustflags: ""
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            rustflags: "-C target-feature=+fullfp16"
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            rustflags: ""
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            rustflags: "-C target-feature=+fullfp16"
    env:
      RUSTFLAGS: ${{ matrix.rustflags }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install CUDA toolkit (Linux — needed to build and link candle-core cuda feature)
        if: runner.os == 'Linux'
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then REPO_ARCH="x86_64"; else REPO_ARCH="sbsa"; fi
          wget -q "https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/${REPO_ARCH}/cuda-keyring_1.1-1_all.deb"
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends cuda-toolkit-12-6
          echo "/usr/local/cuda/bin" >> "$GITHUB_PATH"
          echo "CUDA_PATH=/usr/local/cuda" >> "$GITHUB_ENV"
          # The stubs ship libcuda.so but the dynamic linker needs libcuda.so.1.
          # Create the versioned symlink and expose the stubs dir so the test
          # binary resolves its libcuda dependency on GPU-less CI runners.
          sudo ln -sfn /usr/local/cuda/lib64/stubs/libcuda.so \
                       /usr/local/cuda/lib64/stubs/libcuda.so.1
          echo "LD_LIBRARY_PATH=/usr/local/cuda/lib64/stubs:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      # Install CUDA toolkit and set up MSVC environment on Windows x86_64.
      # Jimver/cuda-toolkit installs nvcc and adds it to PATH; ilammy/msvc-dev-cmd
      # adds cl.exe to PATH (required by nvcc on Windows to compile CUDA kernels).
      - name: Install CUDA toolkit (Windows x86_64)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        uses: Jimver/cuda-toolkit@v0.2.22
        with:
          cuda: '12.6.0'
          method: network
          sub-packages: '["nvcc", "cudart", "nvrtc", "nvrtc_dev", "cublas", "cublas_dev", "curand", "curand_dev"]'

      - name: Set up MSVC environment (Windows x86_64 — nvcc needs cl.exe)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        uses: ilammy/msvc-dev-cmd@v1

      # Git ships its own link.exe in usr/bin which shadows MSVC's link.exe
      # when bash shells are used. Rename it so the MSVC linker is found first.
      - name: Remove Git link.exe shadow (Windows x86_64)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          $gitLink = "C:\Program Files\Git\usr\bin\link.exe"
          if (Test-Path $gitLink) { Rename-Item $gitLink "link.exe.bak" }

      # On Windows x86_64 the test binary crashes at startup with
      # STATUS_DLL_NOT_FOUND because nvcuda.dll (the GPU driver DLL) is absent
      # on GPU-less CI runners. Use --no-run to verify compilation only.
      # All other platforms run tests normally.
      - name: Test
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            # --no-run: the test binary crashes at startup without nvcuda.dll
            # on GPU-less CI runners; just verify compilation succeeds.
            cargo test --no-run -p inferrs -p inferrs-benchmark -p inferrs-backend-musa -p inferrs-backend-vulkan
          else
            # inferrs-backend-musa has no compile-time MUSA SDK dependency, so
            # it builds and runs (probe returns 1 = unavailable) on all runners.
            cargo test -p inferrs -p inferrs-benchmark -p inferrs-backend-musa -p inferrs-backend-vulkan
          fi
